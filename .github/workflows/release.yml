name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-sign-notarise:
    runs-on: [self-hosted, macOS, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Import signing certs
        env:
          DEV_ID_CERT_BASE64: ${{ secrets.DEV_ID_CERT_BASE64 }}
          DEV_ID_CERT_PASSWORD: ${{ secrets.DEV_ID_CERT_PASSWORD }}
        run: ./Tools/import-certs.sh

      - name: Build (release)
        # Universal binary support: SwiftPM 5.10+ honours `-Xswiftc -target`
        # but the simpler portable path here is to build natively on the
        # arm64 runner; x86_64 slice can be added via `lipo` if/when needed.
        run: swift build --configuration release

      - name: Bundle into Pare.app
        run: Tools/build-app-bundle.sh release

      - name: Sign helper + app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: Tools/sign-helper.sh dist/Pare.app

      - name: Notarise
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./Tools/notarise.sh dist/Pare.app

      - name: Package DMG
        run: ./Tools/package-dmg.sh dist/Pare.app dist/Pare.dmg

      - name: Sign Sparkle appcast
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: ./Tools/sign-appcast.sh dist/

      - name: Upload to release CDN
        run: ./Tools/upload-release.sh dist/
